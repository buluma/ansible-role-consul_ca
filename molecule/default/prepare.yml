---
- become: true
  gather_facts: false
- name: Prepare
  hosts: all
  name: Prepare
  pre_tasks:
    - name: Find EXTERNALLY-MANAGED files
      ansible.builtin.find:
        paths: /usr/lib
        patterns: "EXTERNALLY-MANAGED"
        recurse: true
      register: externally_managed_files

    - name: Remove EXTERNALLY-MANAGED files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ externally_managed_files.files }}"

  roles:
    - role: buluma.bootstrap
    - role: buluma.ca_certificates
    - role: buluma.core_dependencies
    - go_version: 1.22.12
      role: buluma.go
  tasks:
    - ansible.builtin.command: go version
      changed_when: false
      environment:
        PATH: /usr/local/go/bin:{{ ansible_facts['env'].PATH }}
      name: Verify that Go is installed and available in the $PATH.
